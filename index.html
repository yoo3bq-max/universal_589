<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Message App</title>
    <style>
        /* CSS: スタイリング */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000003;
            color: white; font-family: sans-serif;
        }

        #bg-container {
            position: absolute; inset: 0; z-index: 0; opacity: 0.6;
            background-image: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&q=80&w=2048');
            background-size: cover; background-position: center;
            filter: blur(0.5px) brightness(0.45);
        }

        #message-stream {
            position: absolute; inset: 0; z-index: 30; pointer-events: none;
        }

        /* メッセージと絵文字の塊 */
        .message-node {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        /* くるくる回る絵文字の設定 */
        .deco-emoji {
            position: absolute;
            z-index: 100;
            font-size: 24px;
            pointer-events: none;
            filter: drop-shadow(0 0 8px cyan);
            will-change: transform;
        }

        .meta-info {
            display: flex; flex-direction: column; align-items: center; gap: 2px; margin-bottom: 6px;
            padding: 4px 12px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); border-radius: 8px;
            border: 1px solid rgba(0,255,255,0.2);
            box-shadow: 0 0 10px rgba(0,255,255,0.1);
        }

        .cosmic-id {
            font-size: 8px; font-weight: bold; color: #00ffff;
            letter-spacing: 0.1em; font-family: 'Courier New', monospace;
        }

        .cosmic-coords {
            font-size: 6px; color: rgba(255,255,255,0.5);
            font-family: monospace;
        }

        .message-bubble {
            padding: 12px 20px; border-radius: 1.2rem; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); max-width: 220px; word-wrap: break-word;
            text-align: center; font-size: 11px; letter-spacing: 0.12em;
        }

        .ui-overlay {
            position: absolute; top: 24px; left: 24px; z-index: 50;
            opacity: 0.6; background: rgba(0,0,0,0.4); padding: 6px 12px;
            border-radius: 8px; backdrop-filter: blur(20px);
        }

        #input-form {
            position: absolute; bottom: 48px; left: 0; right: 0;
            z-index: 50; display: flex; justify-content: center;
        }

        .input-container {
            width: 260px; background: rgba(0,0,0,0.6); border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(30px);
        }

        input {
            width: 100%; background: transparent; border: none; outline: none;
            color: white; padding: 16px; text-align: center;
            letter-spacing: 0.4em; font-size: 9px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>
    <div id="message-stream"></div>

    <div class="ui-overlay">
        <span id="visitor-count" style="font-size: 7px; font-weight: bold; letter-spacing: 0.2em;">ACTIVE_NODES: ---</span>
    </div>

    <form id="input-form">
        <div class="input-container">
            <input type="text" id="message-input" placeholder="MESSAGE TO STARS" maxlength="30" autocomplete="off">
        </div>
    </form>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkmxcg0LykyxIlBnvJQIiiPI_H8Dy_koM",
            authDomain: "universal-8d7eb.firebaseapp.com",
            projectId: "universal-8d7eb",
            storageBucket: "universal-8d7eb.firebasestorage.app",
            messagingSenderId: "242890668753",
            appId: "1:242890668753:web:a94bf7f0eecf6f4efda3f0",
            measurementId: "G-KHLCH9QYEZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'cosmic-message-app';

        let user = null;
        let messages = [];
        let time = 0;

        // --- ID & 星の名前 & 座標の生成 ---
        const getCosmicIdentity = (uid) => {
            const stars = ["ANTARES", "VEGA", "SIRIUS", "BETELGEUSE", "POLARIS", "SPICA", "RIGEL", "ALTAIR", "DENEB", "CAPELLA"];
            const charCodeSum = uid ? uid.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) : Math.random() * 1000;
            
            // 星の名前を決定
            const starName = stars[Math.floor(charCodeSum % stars.length)];
            
            // 緯度・経度のような座標を生成
            const lat = ((charCodeSum % 180) - 90).toFixed(4);
            const lng = ((charCodeSum % 360) - 180).toFixed(4);
            const sector = uid ? uid.substring(0, 2).toUpperCase() : "XX";

            return {
                name: `${starName}-${sector}`,
                coords: `LAT: ${lat}° / LNG: ${lng}°`
            };
        };

        signInAnonymously(auth).catch(err => console.error("Auth Error:", err));
        onAuthStateChanged(auth, u => user = u);

        const msgCol = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
        onSnapshot(msgCol, (snapshot) => {
            document.getElementById('visitor-count').innerText = `ACTIVE_NODES: ${snapshot.size + 1069}`;
            snapshot.docChanges().forEach(change => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    const text = data.text || "";
                    const hasSakana = text.includes('サカナクション');
                    const hasOOR = text.includes('1069') || text.includes('ワンオク');
                    const identity = getCosmicIdentity(data.userId);

                    messages.push({
                        id: change.doc.id,
                        text: text,
                        cosmicName: identity.name,
                        cosmicCoords: identity.coords,
                        x: 20 + Math.random() * 60,
                        y: 105,
                        v: hasOOR ? -0.06 : (-0.012 - Math.random() * 0.006),
                        phase: Math.random() * Math.PI * 2,
                        orbitPhase: Math.random() * Math.PI * 2,
                        opacity: 0,
                        hasSakana: hasSakana,
                        hasOOR: hasOOR,
                        element: null
                    });
                }
            });
        }, (err) => console.error("Snapshot Error:", err));

        function animate() {
            time += 0.005;
            const container = document.getElementById('message-stream');
            const bg = document.getElementById('bg-container');

            if (bg) {
                bg.style.transform = `scale(${1.25 + Math.sin(time * 0.02) * 0.03}) translate(${Math.cos(time * 0.04) * 15}px, ${Math.sin(time * 0.04) * 8}px)`;
            }

            messages.forEach((msg) => {
                msg.y += msg.v;
                const dX = msg.x + Math.sin(time * 0.2 + msg.phase) * 3;
                const dY = msg.y + Math.cos(time * 0.2 + msg.phase) * 2;

                if (msg.y > 10) msg.opacity = Math.min(1, msg.opacity + 0.01);
                if (msg.y < 5) msg.opacity = Math.max(0, msg.opacity - 0.01);

                if (!msg.element) {
                    msg.element = document.createElement('div');
                    msg.element.className = 'message-node';

                    let decoHTML = '';
                    if (msg.hasSakana) decoHTML = '<div class="deco-emoji">🐡</div>';
                    if (msg.hasOOR) decoHTML = '<div class="deco-emoji">🌎</div>';

                    msg.element.innerHTML = `
                        ${decoHTML}
                        <div class="meta-info">
                            <span class="cosmic-id">${msg.cosmicName}</span>
                            <span class="cosmic-coords">${msg.cosmicCoords}</span>
                        </div>
                        <div class="message-bubble">${msg.text}</div>
                    `;
                    container.appendChild(msg.element);
                }

                const deco = msg.element.querySelector('.deco-emoji');
                if (deco) {
                    const radiusX = 55;
                    const radiusY = 20;
                    const ang = time * 2 + msg.orbitPhase;
                    const tx = Math.cos(ang) * radiusX;
                    const ty = Math.sin(ang) * radiusY;
                    deco.style.transform = `translate(${tx}px, ${ty}px)`;
                }

                msg.element.style.left = dX + '%';
                msg.element.style.top = dY + '%';
                msg.element.style.opacity = msg.opacity;
            });

            messages = messages.filter(m => {
                if (m.y < -15) {
                    if (m.element) m.element.remove();
                    return false;
                }
                return true;
            });

            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        const form = document.getElementById('input-form');
        const input = document.getElementById('message-input');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text || !user) return;
            input.value = '';
            try {
                await addDoc(msgCol, {
                    text: text,
                    userId: user.uid,
                    createdAt: serverTimestamp()
                });
            } catch (err) {
                console.error("Submit Error:", err);
                input.value = text;
            }
        };
    </script>
</body>
</html>
