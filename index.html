<!DOCTYPE html>
<html lang="ja" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Cosmic Messenger - High Velocity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;500;900&display=swap');
        body {
            margin: 0;
            padding: 0;
            background-color: #05051a;
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
        }
        .bg-radial {
            background: radial-gradient(circle at center, transparent 0%, rgba(5, 5, 26, 0.6) 100%);
        }
        
        /* アイコンの周回アニメーション */
        @keyframes orbit-around-board {
            from { transform: rotate(0deg) translateX(55px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(55px) rotate(-360deg); }
        }
        
        .orbit-emoji {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 60;
            animation: orbit-around-board 20s linear infinite;
        }

        @keyframes glow-pulse {
            0% { box-shadow: 0 0 5px rgba(34, 211, 238, 0.2); border-color: rgba(255, 255, 255, 0.1); }
            50% { box-shadow: 0 0 25px rgba(34, 211, 238, 0.6); border-color: rgba(34, 211, 238, 0.8); }
            100% { box-shadow: 0 0 5px rgba(34, 211, 238, 0.2); border-color: rgba(255, 255, 255, 0.1); }
        }
        .input-glow:focus-within {
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .live-dot {
            animation: blink 2s infinite;
        }
        
        .notranslate { translate: no !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy, limit };
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [isSending, setIsSending] = useState(false);
            const [isReady, setIsReady] = useState(false);
            const [status, setStatus] = useState('SYSTEM_ONLINE');
            const [liveCount, setLiveCount] = useState(0);
            
            const timeRef = useRef(0);
            const dbRef = useRef(null);
            const authRef = useRef(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'cosmic-messenger-v3';

            const PRESET_PHRASES = [
                "音は空気を震わせる",
                "静寂の中の残響",
                "銀河のパッチワーク",
                "周波数が重なる場所",
                "記憶のミキシング"
            ];

            useEffect(() => {
                const init = async () => {
                    if (!window.FB || typeof __firebase_config === 'undefined') return;
                    try {
                        const config = JSON.parse(__firebase_config);
                        const app = window.FB.initializeApp(config);
                        authRef.current = window.FB.getAuth(app);
                        dbRef.current = window.FB.getFirestore(app);

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await window.FB.signInWithCustomToken(authRef.current, __initial_auth_token);
                        } else {
                            await window.FB.signInAnonymously(authRef.current);
                        }

                        window.FB.onAuthStateChanged(authRef.current, (u) => {
                            if (u) {
                                setUser(u);
                                setStatus('SIGNAL_LOCKED');
                                setIsReady(true);
                                
                                setMessages(PRESET_PHRASES.map((txt, i) => createMessageObject(`preset-${i}`, txt, `system_${i}`, true)));

                                const msgCol = window.FB.collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'messages');
                                window.FB.onSnapshot(msgCol, (snap) => {
                                    setLiveCount(snap.size + Math.floor(Math.random() * 5) + 3);
                                    
                                    setMessages(prev => {
                                        const ids = new Set(prev.map(m => m.id));
                                        const newItems = snap.docs
                                            .filter(d => !ids.has(d.id))
                                            .map(d => createMessageObject(d.id, d.data().text, d.data().userId));
                                        return [...prev, ...newItems].slice(-20);
                                    });
                                }, (err) => setStatus('SIGNAL_LOST'));
                            }
                        });
                    } catch (e) { setStatus('OFFLINE'); }
                };
                const timer = setInterval(() => { if (window.FB) { clearInterval(timer); init(); } }, 100);
                return () => clearInterval(timer);
            }, []);

            const generateIdentity = (uid) => {
                const stars = ["ANTARES", "VEGA", "SIRIUS", "RIGEL", "DENEB", "POLARIS", "SPICA", "ALTAIR"];
                let seed = 0;
                if (uid.startsWith('system')) seed = uid.charCodeAt(uid.length - 1) * 123;
                else if (uid) for (let i = 0; i < uid.length; i++) seed += uid.charCodeAt(i);
                
                return {
                    name: `${stars[seed % stars.length]}-${(seed % 999).toString().padStart(3, '0')}`,
                    coords: `RA ${seed % 24}h / DEC ${seed % 180 - 90}°`
                };
            };

            const checkSpecialKeywords = (text, isPreset) => {
                if (isPreset) return { isSakana: false, isMoon: false, isOor: false, isUotami: false, isTentaikansoku: false, isEndless: false };
                
                return {
                    isSakana: text.includes('サカナクション') || text.includes('新宝島'),
                    isMoon: text.includes('月') || text.includes('MOON'),
                    isOor: text.includes('ワンオクロック') || text.includes('ワンオク'),
                    isUotami: text.includes('魚民') || text.includes('居酒屋'),
                    isTentaikansoku: text.includes('天体観測') || text.includes('望遠鏡'),
                    isEndless: text.includes('エンドレス') || text.includes('無限')
                };
            };

            const createMessageObject = (id, text, userId, isPreset = false) => {
                const iden = generateIdentity(userId);
                const specials = checkSpecialKeywords(text, isPreset);
                
                const baseVel = -0.005 - (Math.random() * 0.006);
                
                return {
                    id, text, userId,
                    name: iden.name,
                    coords: iden.coords,
                    x: 15 + Math.random() * 70,
                    y: isPreset ? (10 + Math.random() * 80) : 110,
                    vel: baseVel,
                    phase: Math.random() * Math.PI * 2,
                    opacity: isPreset ? 0.6 : 0,
                    ...specials
                };
            };

            useEffect(() => {
                const frame = () => {
                    timeRef.current += 0.006;
                    setMessages(prev => prev.map(m => {
                        let nextY = m.y + m.vel;
                        if (nextY < -15) nextY = 115;
                        
                        const nextX = m.x + Math.sin(timeRef.current * 0.12 + m.phase) * 5;
                        let nextOp = m.opacity;
                        
                        if (nextY < 100) nextOp = Math.min(1, nextOp + 0.025);
                        if (nextY < 10) nextOp = Math.max(0, nextOp - 0.025);
                        
                        return { ...m, y: nextY, displayX: nextX, opacity: nextOp };
                    }));
                    requestAnimationFrame(frame);
                };
                requestAnimationFrame(frame);
            }, []);

            const handleSend = async (e) => {
                e.preventDefault();
                if (!inputText.trim() || !isReady || isSending) return;
                setIsSending(true);
                try {
                    const msgCol = window.FB.collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'messages');
                    await window.FB.addDoc(msgCol, {
                        text: inputText,
                        userId: user.uid,
                        createdAt: window.FB.serverTimestamp()
                    });
                    setInputText('');
                } catch (e) { setStatus('SEND_ERROR'); } finally { setIsSending(false); }
            };

            return (
                <div className="relative w-full h-screen overflow-hidden notranslate select-none">
                    <div className="absolute inset-0 z-0 opacity-40 transition-opacity duration-1000" style={{ 
                        backgroundImage: `url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&q=80&w=2048')`, 
                        backgroundSize: 'cover',
                        backgroundPosition: 'center'
                    }} />
                    <div className="absolute inset-0 bg-radial z-10" />

                    <div className="absolute top-10 left-10 z-50 pointer-events-none">
                        <div className="flex flex-col gap-1.5">
                            <div className="flex items-center gap-3">
                                <div className={`h-1.5 w-1.5 rounded-full bg-cyan-400 shadow-[0_0_8px_cyan] live-dot`} />
                                <span className="text-[9px] font-black tracking-[0.5em] text-white/80 uppercase">Live Observer</span>
                            </div>
                            <div className="flex items-baseline gap-2 ml-5">
                                <span className="text-[18px] font-thin text-cyan-300 tracking-tighter">{liveCount.toString().padStart(3, '0')}</span>
                                <span className="text-[7px] text-white/30 font-bold tracking-widest uppercase">Entities Detected</span>
                            </div>
                            <div className="ml-5 h-[1px] w-24 bg-gradient-to-r from-cyan-500/50 to-transparent" />
                            <div className="ml-5 text-[6px] font-mono text-cyan-400/40 tracking-widest">{status}</div>
                        </div>
                    </div>

                    <div className="absolute inset-0 z-30 pointer-events-none">
                        {messages.map(m => (
                            <div key={m.id} className="absolute flex flex-col items-center" style={{ left: `${m.displayX}%`, top: `${m.y}%`, opacity: m.opacity, transform: 'translate(-50%, -50%)' }}>
                                
                                {m.isSakana && <div className="orbit-emoji text-xl">🐡</div>}
                                {m.isMoon && <div className="orbit-emoji text-2xl">🌙</div>}
                                {m.isOor && <div className="orbit-emoji text-2xl">🪐</div>}
                                {m.isUotami && <div className="orbit-emoji text-xl">🐟</div>}
                                {m.isTentaikansoku && <div className="orbit-emoji text-xl">🔭</div>}
                                {m.isEndless && <div className="orbit-emoji text-xl">♥</div>}
                                
                                <div className="mb-2 flex flex-col items-center opacity-30">
                                    <div className="text-[7px] text-cyan-200 font-black tracking-[0.4em]">{m.name}</div>
                                    <div className="text-[5px] text-white/50 font-mono tracking-tighter">{m.coords}</div>
                                </div>
                                <div className="px-8 py-5 bg-white/[0.03] border border-white/10 backdrop-blur-lg rounded-2xl max-w-[260px] text-center shadow-2xl relative z-40">
                                    <p className="text-[14px] text-white/90 tracking-[0.2em] leading-relaxed font-light">{m.text}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="absolute bottom-20 left-0 right-0 z-50 flex justify-center px-6">
                        <form onSubmit={handleSend} className="w-full max-w-[420px]">
                            <div className="input-glow relative bg-black/40 border border-white/[0.08] rounded-full overflow-hidden flex items-center px-12 backdrop-blur-xl transition-all duration-1000 shadow-[0_0_50px_rgba(0,0,0,0.5)]">
                                <input
                                    type="text"
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    placeholder={isSending ? "..." : "MESSAGE TO UNIVERSE"}
                                    disabled={!isReady || isSending}
                                    className="w-full bg-transparent py-7 text-center text-white placeholder-white/5 tracking-[1em] font-bold focus:outline-none uppercase focus:text-white/80"
                                    maxLength={30}
                                />
                            </div>
                        </form>
                    </div>

                    <div className="absolute inset-0 z-40 pointer-events-none shadow-[inset_0_0_100px_rgba(0,0,0,0.5)]" />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
