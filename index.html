<!DOCTYPE html>
<html lang="ja" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Cosmic Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;900&display=swap');
        body {
            margin: 0;
            padding: 0;
            background-color: #02020a;
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
        }
        .bg-radial {
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
        }
        /* 入力欄の呼吸するようなフェードアニメーション */
        @keyframes breathe-light {
            0%, 100% { border-color: rgba(255, 255, 255, 0.1); box-shadow: 0 0 15px rgba(0, 0, 0, 0.5); }
            50% { border-color: rgba(34, 211, 238, 0.4); box-shadow: 0 0 30px rgba(34, 211, 238, 0.15); }
        }
        .input-breathe {
            animation: breathe-light 5s ease-in-out infinite;
        }
        .drop-shadow-glow {
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
        }
        .notranslate { translate: no !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK (Version 11.0.2) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, onSnapshot, addDoc, serverTimestamp, query, orderBy, limit };
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [time, setTime] = useState(0);
            const [isSending, setIsSending] = useState(false);
            const [isDbReady, setIsDbReady] = useState(false);
            
            const timeRef = useRef(0);
            const dbRef = useRef(null);
            const authRef = useRef(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'cosmic-messenger-v3';

            const PRESET_PHRASES = ["音は空気を震わせる", "静寂の中の残響", "銀河のパッチワーク", "周波数が重なる場所", "記憶のミキシング"];

            const generateCosmicIdentity = (uid) => {
                if (uid === "SYSTEM") return { name: "ORIGIN", coords: "00h 00m 00s / +00° 00' 00\"" };
                const starNames = ["ANTARES", "VEGA", "SIRIUS", "BETELGEUSE", "ALTAIR", "POLARIS", "SPICA", "RIGEL", "ARCTURUS", "DENEB", "CAPELLA", "PROCYON"];
                let seed = 0;
                if (uid) {
                    for (let i = 0; i < uid.length; i++) seed += uid.charCodeAt(i);
                } else {
                    seed = Math.floor(Math.random() * 1000);
                }
                const name = starNames[seed % starNames.length];
                const raH = (seed % 24).toString().padStart(2, '0');
                const raM = (seed * 7 % 60).toString().padStart(2, '0');
                const raS = (seed * 13 % 60).toString().padStart(2, '0');
                const decD = ((seed % 180) - 90).toString().padStart(2, '0');
                const decM = (seed * 3 % 60).toString().padStart(2, '0');
                const decS = (seed * 11 % 60).toString().padStart(2, '0');
                return {
                    name: `${name}-${(seed % 999).toString().padStart(3, '0')}`,
                    coords: `RA ${raH}h ${raM}m ${raS}s / DEC ${decD}° ${decM}' ${decS}"`
                };
            };

            const createMessageObject = (id, text, userId, isPreset = false) => {
                const lowerText = text.toLowerCase();
                
                // 反応キーワード判定
                const hasSakana = lowerText.includes('サカナクション');
                const hasMoon = lowerText.includes('tuki') || text.includes('月');
                const hasSkate = lowerText.includes('skateboard');
                const hasTaka = lowerText.includes('taka') || text.includes('taka');
                const hasIkkun = text.includes('いっくん');
                // 新規追加分
                const hasBGM = lowerText.includes('bgm') || lowerText.includes('音楽をかける');
                const hasEngineer = lowerText.includes('サウンドエンジニア') || lowerText.includes('sound engineer');
                const hasLive = lowerText.includes('live sound') || lowerText.includes('live sound engineer');

                const cosmicIdentity = generateCosmicIdentity(userId);
                
                return {
                    id, text, userId, isPreset,
                    hasSakana, hasMoon, hasSkate, hasTaka, hasIkkun, hasBGM, hasEngineer, hasLive,
                    cosmicName: cosmicIdentity.name,
                    cosmicCoords: cosmicIdentity.coords,
                    currentX: 10 + Math.random() * 80,
                    currentY: isPreset ? (10 + Math.random() * 80) : 110,
                    driftXSpeed: 0.05 + Math.random() * 0.1,
                    driftYSpeed: 0.02 + Math.random() * 0.08,
                    oscillationAmpX: 2 + Math.random() * 5,
                    oscillationAmpY: 1.5 + Math.random() * 4,
                    phase: Math.random() * Math.PI * 2,
                    // 音響系キーワードは上昇速度を上げる演出
                    floatVelocity: (hasTaka || hasSkate || hasLive || hasEngineer) ? -0.07 : (-0.008 - Math.random() * 0.005),
                    opacity: isPreset ? 0.4 : 0,
                    orbitPhase: Math.random() * Math.PI * 2
                };
            };

            useEffect(() => {
                const checkFB = setInterval(async () => {
                    if (window.FB && typeof __firebase_config !== 'undefined') {
                        clearInterval(checkFB);
                        try {
                            const config = JSON.parse(__firebase_config);
                            const app = window.FB.initializeApp(config);
                            authRef.current = window.FB.getAuth(app);
                            dbRef.current = window.FB.getFirestore(app);

                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await window.FB.signInWithCustomToken(authRef.current, __initial_auth_token);
                            } else {
                                await window.FB.signInAnonymously(authRef.current);
                            }

                            window.FB.onAuthStateChanged(authRef.current, (u) => {
                                setUser(u);
                                setIsDbReady(true);
                            });

                            const msgCol = window.FB.collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'messages');
                            window.FB.onSnapshot(msgCol, (snapshot) => {
                                setMessages(prev => {
                                    const existingIds = new Set(prev.map(m => m.id));
                                    const newMsgs = snapshot.docs
                                        .filter(doc => !existingIds.has(doc.id))
                                        .map(doc => {
                                            const data = doc.data();
                                            return createMessageObject(doc.id, data.text || "", data.userId || "anon", false);
                                        });
                                    return [...prev, ...newMsgs].slice(-60);
                                });
                            }, (error) => console.error("Firestore error:", error));

                        } catch (err) {
                            console.error("Firebase initialization failed:", err);
                        }
                    }
                }, 100);

                setMessages(PRESET_PHRASES.map((txt, i) => createMessageObject(`preset-${i}`, txt, "SYSTEM", true)));
                return () => clearInterval(checkFB);
            }, []);

            useEffect(() => {
                const animate = () => {
                    timeRef.current += 0.005;
                    setTime(timeRef.current);
                    setMessages(prev => prev.map(msg => {
                        const t = timeRef.current;
                        const newY = msg.currentY + msg.floatVelocity;
                        const dX = msg.currentX + Math.sin(t * msg.driftXSpeed + msg.phase) * msg.oscillationAmpX;
                        const dY = newY + Math.cos(t * msg.driftYSpeed + msg.phase) * msg.oscillationAmpY;
                        
                        let newOpacity = msg.opacity;
                        if (msg.isPreset) {
                            if (newY < -15) return { ...createMessageObject(msg.id, msg.text, msg.userId, true), currentY: 105 };
                            newOpacity = 0.3 + Math.sin(t * 0.4 + msg.phase) * 0.15;
                        } else {
                            if (newY > 5) newOpacity = Math.min(1, msg.opacity + 0.03);
                            if (newY < 10) newOpacity = Math.max(0, msg.opacity - 0.02);
                        }

                        return { ...msg, currentY: newY, displayX: dX, displayY: dY, opacity: newOpacity };
                    }).filter(msg => msg.currentY > -25));
                    requestAnimationFrame(animate);
                };
                const animId = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animId);
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!inputText.trim() || !dbRef.current || isSending) return;
                
                setIsSending(true);
                try {
                    const msgCol = window.FB.collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'messages');
                    await window.FB.addDoc(msgCol, {
                        text: inputText,
                        userId: user ? user.uid : 'anonymous_node',
                        createdAt: window.FB.serverTimestamp()
                    });
                    setInputText('');
                } catch (err) { 
                    console.error("Transmission failed:", err);
                } finally {
                    setIsSending(false);
                }
            };

            return (
                <div className="relative w-full h-screen bg-[#02020a] overflow-hidden text-white notranslate">
                    {/* Background */}
                    <div 
                        className="absolute inset-0 z-0 opacity-40 pointer-events-none"
                        style={{ 
                            backgroundImage: `url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&q=80&w=2048')`,
                            backgroundSize: 'cover',
                            backgroundPosition: 'center',
                            transform: `scale(${1.1 + Math.sin(time * 0.02) * 0.03})`,
                            filter: `brightness(0.7) blur(0.5px)`, 
                        }}
                    />

                    {/* Messages Layer */}
                    <div className="absolute inset-0 z-30 pointer-events-none">
                        {messages.map((msg) => {
                            const orbitX = Math.cos(time * 1.5 + msg.orbitPhase) * 75;
                            const orbitY = Math.sin(time * 1.2 + msg.orbitPhase) * 30;
                            const isOwn = user && msg.userId === user.uid;

                            return (
                                <div key={msg.id} className="absolute" style={{ left: `${msg.displayX}%`, top: `${msg.displayY}%`, opacity: msg.opacity, transform: `translate(-50%, -50%)` }}>
                                    <div className="relative flex flex-col items-center">
                                        
                                        {/* Icons */}
                                        {msg.hasSakana && <div className="absolute text-[24px] drop-shadow-glow" style={{ transform: `translate(${orbitX}px, ${orbitY}px)` }}>🐡</div>}
                                        {msg.hasMoon && <div className="absolute text-[26px] drop-shadow-glow" style={{ transform: `translate(${orbitX}px, ${orbitY}px)` }}>🌙</div>}
                                        {msg.hasSkate && <div className="absolute text-[26px] drop-shadow-glow" style={{ transform: `translate(${orbitX}px, ${orbitY}px)` }}>🛹</div>}
                                        {msg.hasTaka && <div className="absolute text-[28px] drop-shadow-glow" style={{ transform: `translate(${orbitX}px, ${orbitY}px)` }}>🦅</div>}
                                        {msg.hasIkkun && <div className="absolute text-[26px] drop-shadow-glow" style={{ transform: `translate(${orbitX}px, ${orbitY}px)` }}>🐏</div>}
                                        {msg.hasBGM && <div className="absolute text-[26px] drop-shadow-glow" style={{ transform: `translate(${orbitX}px, ${orbitY}px)` }}>🎧</div>}
                                        {msg.hasEngineer && <div className="absolute text-[26px] drop-shadow-glow" style={{ transform: `translate(${orbitX}px, ${orbitY}px)` }}>🎚️</div>}
                                        {msg.hasLive && <div className="absolute text-[26px] drop-shadow-glow" style={{ transform: `translate(${orbitX}px, ${orbitY}px)` }}>🔊</div>}

                                        {/* ID Section */}
                                        <div className="px-4 py-1.5 bg-black/80 rounded-full border border-white/20 mb-2 shadow-lg flex flex-col items-center gap-0.5 min-w-[120px]">
                                            <span className={`text-[9px] font-black tracking-widest uppercase ${msg.isPreset ? 'text-white/30' : (isOwn ? 'text-white' : 'text-cyan-400')}`}>
                                                {msg.cosmicName}
                                            </span>
                                            <span className="text-[6px] font-mono tracking-tighter text-white/40 uppercase">
                                                {msg.cosmicCoords}
                                            </span>
                                        </div>

                                        {/* Message Bubble */}
                                        <div className={`px-7 py-4 rounded-[1.8rem] border-2 backdrop-blur-md max-w-[260px] text-center shadow-2xl transition-all duration-1000 ${msg.isPreset ? 'bg-white/5 border-white/10 text-white/60 italic' : (isOwn ? 'bg-white/10 border-white/40 text-white' : 'bg-cyan-950/40 border-cyan-500/30 text-cyan-50')}`}>
                                            <p className="text-[13px] tracking-[0.18em] leading-relaxed font-medium">
                                                {msg.text}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Status Display - エンジニア寄りの文言 */}
                    <div className="absolute top-10 left-10 z-50 pointer-events-none opacity-40">
                        <div className="flex items-center gap-3">
                            <div className={`h-1.5 w-1.5 rounded-full animate-pulse ${isDbReady ? 'bg-cyan-400' : 'bg-red-400'}`} />
                            <p className="text-[9px] font-bold tracking-[0.4em] text-white/70 uppercase">
                                {isDbReady ? 'AUDIO_CORE_STABLE' : 'CALIBRATING_SENSORS...'}
                            </p>
                        </div>
                    </div>

                    {/* Input Area */}
                    <div className="absolute bottom-20 left-0 right-0 z-50 flex justify-center px-6">
                        <form onSubmit={handleSubmit} className="w-full max-w-[320px] pointer-events-auto">
                            <div className={`input-breathe relative rounded-full border bg-black/90 backdrop-blur-3xl transition-all duration-1000 group ${isSending ? 'opacity-50' : 'opacity-100'} focus-within:border-cyan-400/80`}>
                                <input
                                    type="text"
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    placeholder={isSending ? "TRANSMITTING..." : "SIGNAL TO UNIVERSE"}
                                    disabled={!isDbReady || isSending}
                                    className="w-full bg-transparent px-10 py-6 text-center text-white placeholder-white/20 focus:outline-none tracking-[0.5em] text-[11px] uppercase font-bold transition-opacity duration-1000"
                                    maxLength={30}
                                />
                                <div className="absolute bottom-0 left-1/2 -translate-x-1/2 h-[1px] bg-cyan-400 w-0 group-focus-within:w-1/2 opacity-0 group-focus-within:opacity-100 transition-all duration-1000" />
                            </div>
                        </form>
                    </div>

                    <div className="absolute inset-0 z-40 pointer-events-none bg-radial" />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
